name: Clean expired branches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Delete branches older than 3 hours
        run: |
          NOW=$(date +%s)
          THREE_HOURS_AGO=$((NOW - 10800))

          git branch -r | grep -E 'origin/(user_|vip_)' | while read branch; do
            branch_name=${branch#origin/}
            timestamp=$(echo "$branch_name" | grep -oE '[0-9]{10,}' | tail -1)
            if [ -n "$timestamp" ]; then
              if [ "$timestamp" -lt "$THREE_HOURS_AGO" ]; then
                echo "Deleting old branch: $branch_name (created at $timestamp)"
                git push origin --delete "$branch_name" || echo "Failed to delete $branch_name"
                USER_ID=$(echo "$branch_name" | sed 's/^[^_]*_[^_]*_\([0-9]*\)_.*/\1/')
                curl -s -X POST "${{ github.event.inputs.callback_url || secrets.WORKER_URL }}/api/cleanup" \
                  -H "Content-Type: application/json" \
                  -d "{\"user_id\":\"$USER_ID\"}" || echo "Failed to notify worker for $USER_ID"
              else
                echo "Skipping $branch_name (timestamp $timestamp) - not expired yet"
              fi
            else
              echo "Skipping $branch_name - no timestamp found"
            fi
          done

      - name: Delete branches with expires_at from D1 (via Worker API)
        run: |
          curl -X POST "${{ github.event.inputs.callback_url || secrets.WORKER_URL }}/api/cleanup-branches" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${{ secrets.ADMIN_SECRET }}\"}"