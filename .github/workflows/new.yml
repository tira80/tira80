name: Generate Bot Session String

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-session:
    runs-on: ubuntu-latest
    steps:
      - name: Install Pyrogram
        run: pip install pyrogram tgcrypto

      - name: Generate Session String
        id: gen_session
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import asyncio, os
          from pyrogram import Client

          async def main():
              api_id = int(os.getenv("TG_API_ID"))
              api_hash = os.getenv("TG_API_HASH")
              bot_token = os.getenv("BOT_TOKEN")

              print("Connecting to Telegram...")
              bot = Client("s", api_id=api_id, api_hash=api_hash, bot_token=bot_token)
              async with bot:
                  print("Connected to Telegram")
                  session_str = await bot.export_session_string()
                  print("Session string generated successfully")
                  # ذخیره در فایل موقت
                  with open("/tmp/session.txt", "w") as f:
                      f.write(session_str)
                  print("Saved to file")

          asyncio.run(main())
          PYEOF

      - name: Save Session String to GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          SESSION=$(cat /tmp/session.txt)
          
          # دریافت public key ریپو
          KEY_RESPONSE=$(curl -s             -H "Authorization: token $GH_TOKEN"             -H "Accept: application/vnd.github.v3+json"             "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/secrets/public-key")
          
          PUBLIC_KEY=$(echo "$KEY_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          KEY_ID=$(echo "$KEY_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          echo "Got public key ID: $KEY_ID"
          
          # نصب tweetnacl و رمزنگاری با Node.js
          cd /tmp && npm init -y -q > /dev/null 2>&1
          npm install tweetnacl tweetnacl-sealedbox-js --save -q > /dev/null 2>&1
          
          node << 'NODEOF'
          const nacl = require('/tmp/node_modules/tweetnacl');
          const sealedBox = require('/tmp/node_modules/tweetnacl-sealedbox-js');
          const fs = require('fs');
          
          const session = fs.readFileSync('/tmp/session.txt', 'utf8').trim();
          const pubKeyB64 = process.env.PUBLIC_KEY;
          const pubKeyBytes = Buffer.from(pubKeyB64, 'base64');
          const msgBytes = Buffer.from(session, 'utf8');
          const encrypted = sealedBox.seal(msgBytes, pubKeyBytes);
          const encryptedB64 = Buffer.from(encrypted).toString('base64');
          fs.writeFileSync('/tmp/encrypted.txt', encryptedB64);
          console.log('Encryption successful');
          NODEOF
          
          ENCRYPTED=$(cat /tmp/encrypted.txt)
          echo "Saving TG_SESSION_STRING secret..."
          
          RESULT=$(curl -s -o /tmp/secret_result.txt -w "%{http_code}"             -X PUT             -H "Authorization: token $GH_TOKEN"             -H "Content-Type: application/json"             -H "Accept: application/vnd.github.v3+json"             "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/secrets/TG_SESSION_STRING"             -d "{"encrypted_value":"$ENCRYPTED","key_id":"$KEY_ID"}")
          
          echo "GitHub API status: $RESULT"
          if [ "$RESULT" = "201" ] || [ "$RESULT" = "204" ]; then
            echo "TG_SESSION_STRING saved to GitHub Secrets successfully!"
          else
            cat /tmp/secret_result.txt
            echo "Failed to save secret, status: $RESULT"
            exit 1
          fi

      - name: Notify Worker
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKFLOW_SECRET: ${{ secrets.WORKFLOW_SECRET }}
          REPO_ID: ${{ secrets.REPO_ID }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          SESSION=$(cat /tmp/session.txt)
          
          # اطلاع به ورکر برای ذخیره در دیتابیس
          HTTP_CODE=$(curl -s -o /tmp/worker_response.txt -w "%{http_code}"             -X POST "$WORKER_URL/api/session-string"             -H "Content-Type: application/json"             -H "X-Workflow-Secret: $WORKFLOW_SECRET"             -d "{"repo_id":$REPO_ID,"session_string":"$SESSION","repo_owner":"$REPO_OWNER","repo_name":"$REPO_NAME"}"             --max-time 30)
          
          echo "Worker response code: $HTTP_CODE"
          cat /tmp/worker_response.txt
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Worker notified successfully!"
          else
            echo "Warning: Worker notification failed (code: $HTTP_CODE), but session was already saved to GitHub Secret directly."
            echo "This is non-fatal - the session string is in TG_SESSION_STRING secret."
          fi

      - name: Cleanup - Delete this workflow file
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          rm -f /tmp/session.txt
          
          FILE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN"             "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml")
          
          FILE_SHA=$(echo "$FILE_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
          
          if [ -n "$FILE_SHA" ] && [ "$FILE_SHA" != "None" ]; then
            curl -s -X DELETE               -H "Authorization: token $GH_TOKEN"               -H "Content-Type: application/json"               "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml"               -d "{"message":"Remove temporary session generation workflow","sha":"$FILE_SHA","branch":"main"}"
            echo "Workflow file deleted"
          fi

      - name: Cleanup - Delete this workflow file
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          echo "Cleaning up workflow file..."
          
          FILE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml")
          
          FILE_SHA=$(echo "$FILE_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
          
          if [ -n "$FILE_SHA" ] && [ "$FILE_SHA" != "None" ]; then
            curl -s -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml" \
              -d "{\"message\":\"Remove temporary session generation workflow\",\"sha\":\"$FILE_SHA\",\"branch\":\"main\"}"
            
            echo "Workflow file deleted"
          else
            echo "Could not find workflow file to delete"
          fi

      - name: Cleanup - Delete workflow run history
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          echo "Cleaning up workflow run history..."
          
          CURRENT_RUN_ID="${{ github.run_id }}"
          
          curl -s -X DELETE \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$CURRENT_RUN_ID/logs"
          
          echo "Run logs deleted"
          
          curl -s -X DELETE \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$CURRENT_RUN_ID"
          
          echo "Workflow run deleted"
          echo "All sensitive data cleaned up successfully"