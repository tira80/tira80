name: Generate Bot Session String

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-session:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install pyrogram tgcrypto pynacl

      - name: Generate Session String
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import asyncio, os
          from pyrogram import Client

          async def main():
              api_id = int(os.getenv("TG_API_ID"))
              api_hash = os.getenv("TG_API_HASH")
              bot_token = os.getenv("BOT_TOKEN")

              print("Connecting to Telegram...")
              bot = Client("s", api_id=api_id, api_hash=api_hash, bot_token=bot_token)
              async with bot:
                  print("Connected to Telegram")
                  session_str = await bot.export_session_string()
                  print("Session string generated successfully")
                  with open("/tmp/session.txt", "w") as f:
                      f.write(session_str)
                  print("Saved to /tmp/session.txt")

          asyncio.run(main())
          PYEOF

      - name: Save Session String to GitHub Secret (via PyNaCl)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, urllib.request, urllib.error
          from nacl.public import PublicKey, SealedBox

          gh_token = os.environ["GH_TOKEN"]
          repo_owner = os.environ["REPO_OWNER"]
          repo_name = os.environ["REPO_NAME"]

          with open("/tmp/session.txt", "r") as f:
              session_str = f.read().strip()

          print(f"Session string length: {len(session_str)}")

          # Step 1: Get repo public key
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo_owner}/{repo_name}/actions/secrets/public-key",
              headers={
                  "Authorization": f"token {gh_token}",
                  "Accept": "application/vnd.github.v3+json",
                  "User-Agent": "GitHub-Secret-Setter/1.0"
              }
          )
          with urllib.request.urlopen(req) as resp:
              key_data = json.loads(resp.read().decode())

          public_key_b64 = key_data["key"]
          key_id = key_data["key_id"]
          print(f"Got public key, key_id: {key_id}")

          # Step 2: Encrypt with libsodium sealed box (exact method GitHub requires)
          public_key_bytes = base64.b64decode(public_key_b64)
          pub_key = PublicKey(public_key_bytes)
          sealed_box = SealedBox(pub_key)
          encrypted_bytes = sealed_box.encrypt(session_str.encode("utf-8"))
          encrypted_b64 = base64.b64encode(encrypted_bytes).decode("utf-8")
          print("Encryption successful")

          # Step 3: Upload to GitHub Secrets
          payload = json.dumps({
              "encrypted_value": encrypted_b64,
              "key_id": key_id
          }).encode("utf-8")

          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo_owner}/{repo_name}/actions/secrets/TG_SESSION_STRING",
              data=payload,
              method="PUT",
              headers={
                  "Authorization": f"token {gh_token}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
                  "User-Agent": "GitHub-Secret-Setter/1.0"
              }
          )
          try:
              with urllib.request.urlopen(req2) as resp2:
                  status = resp2.status
          except urllib.error.HTTPError as e:
              status = e.code
              body = e.read().decode()
              print(f"Error body: {body}")

          if status in (201, 204):
              print(f"SUCCESS: TG_SESSION_STRING saved to GitHub Secrets (HTTP {status})")
          else:
              print(f"FAILED: GitHub returned HTTP {status}")
              exit(1)
          PYEOF

      - name: Notify Worker (save to DB)
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKFLOW_SECRET: ${{ secrets.WORKFLOW_SECRET }}
          REPO_ID: ${{ secrets.REPO_ID }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, urllib.error

          worker_url = os.environ.get("WORKER_URL", "")
          workflow_secret = os.environ.get("WORKFLOW_SECRET", "")
          repo_id = os.environ.get("REPO_ID", "")
          repo_owner = os.environ.get("REPO_OWNER", "")
          repo_name = os.environ.get("REPO_NAME", "")

          with open("/tmp/session.txt", "r") as f:
              session_str = f.read().strip()

          if not worker_url:
              print("WORKER_URL not set, skipping worker notification")
              exit(0)

          payload = json.dumps({
              "repo_id": int(repo_id),
              "session_string": session_str,
              "repo_owner": repo_owner,
              "repo_name": repo_name
          }).encode("utf-8")

          req = urllib.request.Request(
              f"{worker_url}/api/session-string",
              data=payload,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "X-Workflow-Secret": workflow_secret,
                  "User-Agent": "GitHub-Actions/1.0"
              }
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  result = json.loads(resp.read().decode())
                  if result.get("success"):
                      print("Worker notified successfully - session saved to DB")
                  else:
                      print(f"Worker returned error: {result.get('error')}")
                      print("Non-fatal: session is already in GitHub Secrets")
          except Exception as e:
              print(f"Worker notification failed: {e}")
              print("Non-fatal: TG_SESSION_STRING is already saved to GitHub Secrets directly")
          PYEOF

      - name: Cleanup - Delete this workflow file and run history
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: |
          rm -f /tmp/session.txt
          echo "Cleaned up local session file"

          # Delete new.yml
          FILE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml")

          FILE_SHA=$(echo "$FILE_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ] && [ "$FILE_SHA" != "None" ] && [ "$FILE_SHA" != "" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/.github/workflows/new.yml" \
              -d "{\"message\":\"Remove temporary session generation workflow\",\"sha\":\"$FILE_SHA\",\"branch\":\"main\"}")
            echo "Delete new.yml HTTP: $HTTP"
          else
            echo "new.yml not found or already deleted"
          fi

          # Delete this run's logs and history
          RUN_ID="${{ github.run_id }}"
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$RUN_ID/logs"
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$RUN_ID"
          echo "Workflow run history cleaned up"
